<svg width="126" height="92" viewBox="10 14 126 92" xmlns="http://www.w3.org/2000/svg">
  <!-- left square ring -->
  <rect x="20" y="20" width="72" height="72" rx="14" fill="none" stroke="#ffffff" stroke-width="6"/>
  <!-- right square ring, overlapping -->
  <rect x="64" y="20" width="72" height="72" rx="14" fill="none" stroke="#ffffff" stroke-width="6" opacity=".45"/>
  <!-- teal mask to create interlace illusion on teal bg -->
  <rect x="64" y="30" width="22" height="52" fill="#00796b"/>
  <!-- re-draw left ring front segment -->
  <path d="M64 32 L64 80" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
